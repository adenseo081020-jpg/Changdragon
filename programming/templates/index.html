<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 최적화 솔루션 찾아주기</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            border: none;
            background: #4a90e2;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #357abd;
        }

        .feedback {
            margin-top: 30px;
            background: #eef5ff;
            padding: 20px;
            border-radius: 10px;
        }

        .feedback li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>생활 습관 피드백 시스템</h1>

    <form method="POST">

        <label>수면 시간 (시간)</label>
        <input type="number" step="0.1" name="sleep" required>

        <label>등급</label>
        <input type="number" step="0.1" name="grade" required>

        <label>아침 식사 여부</label>
        <select name="breakfast">
            <option value="yes">예</option>
            <option value="no">아니오</option>
        </select>

        <label>낮잠 시간 (분)</label>
        <input type="number" step="1" name="nap" required>

        <label>공부 시간 (시간)</label>
        <input type="number" step="0.1" name="study_time" required>

        <button type="submit">피드백 받기</button>
    </form>

    {% if feedback %}
    <div class="feedback">
        <h2>분석 결과</h2>
        <ul>
            {% for item in feedback %}
            <li>{{ item }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

</body>
</html>
